name: Bug Report
description: Report a build failure, deploy issue, or site bug
title: '[bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for reporting an issue with the blit386.dev documentation site.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: The build fails with…
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. pnpm run dev
        2. Open /
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Node / pnpm version (if known)
      placeholder: Node 22.18.0, pnpm 10.26.2
