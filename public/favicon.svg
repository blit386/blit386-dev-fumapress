<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @media (prefers-color-scheme: light), (prefers-color-scheme: no-preference) {
      #favicon-dark { display: none }
    }
    @media (prefers-color-scheme: dark) {
      #favicon-light { display: none }
    }
  </style>
  <image id="favicon-light" style="image-rendering:pixelated" href="data:image/png;base64," width="32" height="32"/>
  <image id="favicon-dark"  style="image-rendering:pixelated" href="data:image/png;base64,"  width="32" height="32"/>
</svg>